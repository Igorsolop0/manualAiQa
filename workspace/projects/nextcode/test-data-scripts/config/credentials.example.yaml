# Credentials configuration for test data scripts
# Copy this file to credentials.yaml and fill in your actual values

# IMPORTANT: Never commit credentials.yaml to version control!

# Website API / GraphQL authentication
# Note: Most scripts will auto-register test users, so no pre-existing credentials needed.
# However, if you want to use an existing account for testing, provide credentials here.
website_api:
  # For existing user login (optional)
  email: "your-test-email@nextcode.tech"
  password: "your-test-password"
  
  # Session token (if you already have one)
  session_token: ""

# BackOffice API authentication
backoffice_api:
  # UserId is already configured in environments.yaml per environment
  # No additional credentials needed for QA/Dev (UserId: 1)
  # For Prod, UserId: 560 (Ihor's account) - use with caution
  
  # Optional: If BackOffice requires API key in future
  api_key: ""

# Wallet API
wallet_api:
  # No authentication required for Wallet API
  # Open API - just needs partnerId and clientId in URL
  
# GraphQL endpoint
graphql:
  # For player registration
  url: "https://minebit-casino.{env}.sofon.one/graphql"
  # Partner ID for Minebit is 5 (configured in environments.yaml)
  
# Jira API (for ticket-related test data generation)
jira:
  # Optional: For generating test emails with ticket IDs
  api_token: ""
  email: "ihor.so@nextcode.tech"
  domain: "https://next-t-code.atlassian.net"

# TestRail API (optional)
testrail:
  api_key: ""
  email: "ihor.so@nextcode.tech"
  url: "https://nexttcode.testrail.io"