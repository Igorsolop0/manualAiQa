<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw Architecture v4.3 — Core Trio + Pilot Runtime Map</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --panel: rgba(16, 16, 24, 0.92);
            --card: rgba(22, 22, 35, 0.85);
            --border: rgba(255,255,255,0.06);
            --text: #e8eaed;
            --muted: #7a7f8a;
            --accent: #f59e0b;
            --nexus: #f59e0b;
            --qa: #a78bfa;
            --api: #38bdf8;
            --jira: #34d399;
            --cron: #f472b6;
            --shared: #ec4899;
            --user: #10b981;
            --memory: #06b6d4;
            --slack: #e01e5a;
            --telegram: #26a5e4;
            --research: #fb7185;
            --stagehand: #f97316;
            --knowledge: #14b8a6;
            --heartbeat: #22c55e;
        }

        * { box-sizing: border-box; margin: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* ── Sidebar ───────────────────────── */
        .sidebar {
            width: 380px;
            min-width: 380px;
            background: var(--panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 50;
            backdrop-filter: blur(32px);
        }
        .sidebar-header {
            padding: 28px 24px 0;
        }
        .sidebar-header h1 {
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #f59e0b, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.2;
        }
        .sidebar-header .version {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--muted);
            margin-top: 4px;
            letter-spacing: 1px;
        }

        .tabs {
            display: flex;
            gap: 2px;
            padding: 16px 24px 0;
            border-bottom: 1px solid var(--border);
        }
        .tab {
            padding: 10px 16px;
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--muted);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            background: none;
            border-top: none; border-left: none; border-right: none;
        }
        .tab:hover { color: var(--text); }
        .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
        }
        .sidebar-content::-webkit-scrollbar { width: 4px; }
        .sidebar-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

        .info-card {
            padding: 16px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 12px;
        }
        .info-card h3 {
            font-size: 0.9rem;
            font-weight: 700;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .info-card p {
            font-size: 0.82rem;
            line-height: 1.6;
            color: var(--muted);
        }
        .info-card code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            background: rgba(255,255,255,0.06);
            padding: 2px 6px;
            border-radius: 4px;
            color: #8b5cf6;
        }

        .tag-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 10px;
        }
        .tag {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            padding: 3px 8px;
            border-radius: 4px;
            background: rgba(255,255,255,0.05);
            color: var(--muted);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .tag.ok { color: #34d399; border-color: rgba(52,211,153,0.3); }
        .tag.err { color: #f87171; border-color: rgba(248,113,113,0.3); }
        .tag.warn { color: #fbbf24; border-color: rgba(251,191,36,0.3); }

        .status-dot {
            width: 8px; height: 8px; border-radius: 50%; display: inline-block;
        }
        .status-dot.green { background: #34d399; box-shadow: 0 0 6px #34d399; }
        .status-dot.red { background: #f87171; box-shadow: 0 0 6px #f87171; }
        .status-dot.yellow { background: #fbbf24; box-shadow: 0 0 6px #fbbf24; }

        .legend {
            padding: 20px 24px;
            border-top: 1px solid var(--border);
        }
        .legend h4 {
            font-size: 0.75rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.78rem;
            color: var(--muted);
            margin-bottom: 6px;
        }
        .legend-line {
            width: 28px;
            height: 3px;
            border-radius: 2px;
        }

        /* ── Canvas ─────────────────────────── */
        .canvas-wrap {
            flex: 1;
            position: relative;
            overflow: hidden;
            background:
                radial-gradient(circle at 30% 20%, rgba(245,158,11,0.03), transparent 40%),
                radial-gradient(circle at 70% 80%, rgba(139,92,246,0.03), transparent 40%);
        }
        .canvas-wrap::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: radial-gradient(rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 32px 32px;
            z-index: 0;
        }

        svg.lines {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
        }

        /* ── Nodes ──────────────────────────── */
        .node {
            position: absolute;
            transform: translate(-50%, -50%);
            z-index: 10;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .node:hover {
            z-index: 20;
            transform: translate(-50%, -50%) scale(1.08);
        }
        .node-inner {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 18px;
            border-radius: 12px;
            border: 2px solid;
            backdrop-filter: blur(16px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            white-space: nowrap;
        }
        .node.hub .node-inner {
            padding: 16px 22px;
            border-width: 2.5px;
            box-shadow: 0 12px 48px rgba(0,0,0,0.5);
        }
        .node .icon { font-size: 1.4rem; }
        .node.hub .icon { font-size: 1.8rem; }
        .node .name { font-weight: 700; font-size: 0.88rem; }
        .node.hub .name { font-size: 1rem; }
        .node .sub {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            color: var(--muted);
            margin-top: 2px;
        }

        .node-status {
            position: absolute;
            top: -4px;
            right: -4px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 2px solid var(--bg);
        }
        .node-status.green { background: #34d399; }
        .node-status.yellow { background: #fbbf24; }
        .node-status.red { background: #f87171; }

        /* Zone labels */
        .zone-label {
            position: absolute;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: rgba(255,255,255,0.12);
            font-weight: 700;
            z-index: 1;
            pointer-events: none;
        }

        /* ── SVG paths ──────────────────────── */
        .link { fill: none; stroke-linecap: round; }
        .link-exec { stroke: #8b5cf6; stroke-width: 2.5; stroke-dasharray: 8 4; animation: dash 1.2s linear infinite; }
        .link-session { stroke: #f59e0b; stroke-width: 2; stroke-dasharray: 4 4; animation: dash 1.5s linear infinite; }
        .link-cron { stroke: #f472b6; stroke-width: 2; stroke-dasharray: 3 6; animation: dashRev 2s linear infinite; }
        .link-rw { stroke: #38bdf8; stroke-width: 1.5; opacity: 0.6; }
        .link-io { stroke: #10b981; stroke-width: 2.5; stroke-dasharray: 6 4; animation: dash 1.5s linear infinite; }
        .link-memory { stroke: #06b6d4; stroke-width: 1.5; stroke-dasharray: 2 4; opacity: 0.5; }

        .link-label {
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            font-weight: 600;
            fill: var(--muted);
        }

        @keyframes dash { to { stroke-dashoffset: -24; } }
        @keyframes dashRev { to { stroke-dashoffset: 24; } }

        /* ── Dimming ────────────────────────── */
        .canvas-wrap.dimmed .node:not(.hl) { opacity: 0.12; filter: grayscale(80%); }
        .canvas-wrap.dimmed .link:not(.hl-link) { opacity: 0.04 !important; }
        .canvas-wrap.dimmed .link-label:not(.hl-label) { opacity: 0 !important; }
        .canvas-wrap.dimmed .zone-label { opacity: 0.04; }
        .hl-link { stroke-width: 3.5 !important; opacity: 1 !important; filter: drop-shadow(0 0 3px currentColor); }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">
        <h1 id="title">🦞 OpenClaw v4.3</h1>
        <div class="version" id="subtitle">CORE TRIO + PILOT RUNTIME — ORCHESTRATION MAP</div>
    </div>

    <div class="tabs">
        <button class="tab active" onclick="showTab('overview')">Overview</button>
        <button class="tab" onclick="showTab('agents')">Agents</button>

        <button class="tab" onclick="showTab('cron')">Ops & Rhythm</button>
    </div>

    <div class="sidebar-content" id="sidebar-body">
        <!-- filled by JS -->
    </div>

    <div class="legend">
        <h4>Connection Types</h4>

        <div class="legend-item"><div class="legend-line" style="background:#f59e0b;"></div> sessions_send (notify)</div>

        <div class="legend-item"><div class="legend-line" style="background:#06b6d4;"></div> memory / knowledge feedback</div>
    </div>
</div>

<div class="canvas-wrap" id="canvasWrap">
    <!-- Zone labels -->
    <div class="zone-label" style="top:5%;left:50%;transform:translateX(-50%)">Channels</div>
    <div class="zone-label" style="top:24%;left:50%;transform:translateX(-50%)">Orchestration</div>
    <div class="zone-label" style="top:52%;left:50%;transform:translateX(-50%)">Shared State</div>
    <div class="zone-label" style="top:78%;left:50%;transform:translateX(-50%)">Execution & Automation</div>

    <svg class="lines" id="svg"></svg>
    <div id="nodes"></div>
</div>

<script>
const NODES = [
    // Channels
    { id:'slack',     icon:'💬', name:'Slack',     sub:'#general · #qa-testing · #gmail', x:35, y:10, color:'var(--slack)',    status:'green' },
    { id:'telegram',  icon:'✈️', name:'Telegram',  sub:'short pings + private chat', x:65, y:10, color:'var(--telegram)', status:'green' },

    { id:'knowledge_q', icon:'🗂️', name:'contracts + registry', sub:'schemas + capability/maturity guardrails', x:86, y:52, color:'var(--knowledge)' },

    // Execution & Automation

    { id:'stagehand', icon:'🧭', name:'Stagehand',  sub:'path-finding for unstable UI only', x:31, y:85, color:'var(--stagehand)', status:'green' },
    { id:'cipher',    icon:'🔌', name:'Cipher',     sub:'API / BE / data prep / swagger', x:50, y:85, color:'var(--api)', hub:true, status:'green' },
    { id:'research',  icon:'🔎', name:'Researcher', sub:'async digest only (alpha advisory)', x:69, y:85, color:'var(--research)', hub:true, status:'yellow' },

    // Schedulers
    { id:'cron_engine', icon:'⏰', name:'Cron Engine', sub:'reliable scheduled jobs', x:92, y:68, color:'var(--cron)', status:'green' },

const LINKS = [
    // User channels → Nexus
    { from:'slack',    to:'nexus',   type:'io',      label:'Ticket / context / report request' },
    { from:'telegram', to:'nexus',   type:'io',      label:'Short ping / private chat' },

    { from:'nexus', to:'memory_n',   type:'rw',      label:'Read/Write memory' },
    { from:'nexus', to:'knowledge',  type:'rw',      label:'Read project knowledge' },
    { from:'heartbeat', to:'nexus',  type:'cron',    label:'Periodic check-in' },

    // Nexus → Shared
    { from:'nexus', to:'tasks',       type:'rw',      label:'Write test plan / task' },
    { from:'nexus', to:'creds',       type:'rw',      label:'Prepare credentials' },

    { from:'nexus', to:'daily_notes', type:'rw',      label:'Read raw daily logs' },
    { from:'nexus', to:'knowledge_q', type:'rw',      label:'Promote distilled learnings' },

    { from:'cipher',  to:'tasks',      type:'rw',      label:'Read API task' },

    { from:'knowledge_q', to:'nexus',   type:'memory', label:'Use in better plans' },
    { from:'knowledge_q', to:'clawver', type:'memory', label:'Use in better testing' },
    { from:'knowledge_q', to:'cipher',  type:'memory', label:'Use in better API prep' },

const TABS = {
    overview: `
        <div class="info-card">
            <h3>🏗️ Architecture: Hub & Spoke v4.0</h3>

// ── Render ─────────────────────────────────
const nodesEl = document.getElementById('nodes');
const svgEl = document.getElementById('svg');
const wrap = document.getElementById('canvasWrap');

// Render nodes
NODES.forEach(n => {
    const div = document.createElement('div');
    div.className = `node${n.hub ? ' hub' : ''}`;
    div.id = n.id;
    div.style.left = n.x + '%';
    div.style.top = n.y + '%';
    div.innerHTML = `
        <div class="node-inner" style="background:${n.color}22;border-color:${n.color}">
            <div class="icon">${n.icon}</div>
            <div>
                <div class="name">${n.name}</div>
                <div class="sub">${n.sub}</div>
            </div>
        </div>
        ${n.status ? `<div class="node-status ${n.status}"></div>` : ''}
    `;
    div.addEventListener('mouseenter', () => highlight(n.id));
    div.addEventListener('mouseleave', clearHL);
    nodesEl.appendChild(div);
});

function getPos(id) {
    const el = document.getElementById(id);
    if (!el) return { x: 0, y: 0 };
    const r = el.getBoundingClientRect();
    const p = wrap.getBoundingClientRect();
    return { x: r.left - p.left + r.width / 2, y: r.top - p.top + r.height / 2 };
}

function drawLinks() {
    svgEl.querySelectorAll('.link, .link-label').forEach(e => e.remove());

    // Arrow markers
    let defs = svgEl.querySelector('defs');
    if (!defs) {
        defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
        defs.innerHTML = `
            <marker id="arr-exec" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0 0L10 5L0 10z" fill="#8b5cf6"/></marker>
            <marker id="arr-session" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0 0L10 5L0 10z" fill="#f59e0b"/></marker>
            <marker id="arr-cron" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0 0L10 5L0 10z" fill="#f472b6"/></marker>
            <marker id="arr-io" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0 0L10 5L0 10z" fill="#10b981"/></marker>
        `;
        svgEl.appendChild(defs);
    }

    LINKS.forEach((l, i) => {
        const a = getPos(l.from);
        const b = getPos(l.to);
        const mx = (a.x + b.x) / 2;
        const my = (a.y + b.y) / 2;
        const dx = b.x - a.x;
        const dy = b.y - a.y;

        // Offset for duplicate links between same nodes
        const dupes = LINKS.filter((ll, j) => j < i && ((ll.from === l.from && ll.to === l.to) || (ll.from === l.to && ll.to === l.from)));
        const off = dupes.length * 25;

        let cx = mx + (Math.abs(dy) > Math.abs(dx) ? off + 20 : 0);
        let cy = my + (Math.abs(dx) > Math.abs(dy) ? -(off + 20) : 0);

        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        const d = `M${a.x} ${a.y} Q${cx} ${cy} ${b.x} ${b.y}`;
        path.setAttribute('d', d);
        path.setAttribute('class', `link link-${l.type}`);
        path.setAttribute('data-from', l.from);
        path.setAttribute('data-to', l.to);
        path.id = `link${i}`;

        if (['exec','session','cron','io'].includes(l.type)) {
            path.setAttribute('marker-end', `url(#arr-${l.type})`);
        }

        svgEl.appendChild(path);

        const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        txt.setAttribute('class', 'link-label');
        txt.setAttribute('data-from', l.from);
        txt.setAttribute('data-to', l.to);
        txt.setAttribute('dy', '-6');
        const tp = document.createElementNS('http://www.w3.org/2000/svg', 'textPath');
        tp.setAttribute('href', `#link${i}`);
        tp.setAttribute('startOffset', '50%');
        tp.setAttribute('text-anchor', 'middle');
        tp.textContent = l.label;
        txt.appendChild(tp);
        svgEl.appendChild(txt);
    });
}

function highlight(id) {
    wrap.classList.add('dimmed');
    document.getElementById(id).classList.add('hl');

    LINKS.forEach((l, i) => {
        if (l.from === id || l.to === id) {
            const other = l.from === id ? l.to : l.from;
            const otherEl = document.getElementById(other);
            if (otherEl) otherEl.classList.add('hl');
            svgEl.querySelector(`#link${i}`)?.classList.add('hl-link');
            svgEl.querySelectorAll(`.link-label`).forEach(t => {
                if (t.getAttribute('data-from') === l.from && t.getAttribute('data-to') === l.to) {
                    t.classList.add('hl-label');
                }
            });
        }
    });

    // Update sidebar with node info
    const node = NODES.find(n => n.id === id);
    if (node) {
        document.getElementById('title').innerHTML = `${node.icon} ${node.name}`;
        document.getElementById('subtitle').textContent = node.sub;
    }
}

function clearHL() {
    wrap.classList.remove('dimmed');
    document.querySelectorAll('.hl,.hl-link,.hl-label').forEach(e => e.classList.remove('hl','hl-link','hl-label'));
    document.getElementById('title').innerHTML = '🦞 OpenClaw v4.3';
    document.getElementById('subtitle').textContent = 'CORE TRIO + PILOT RUNTIME — ORCHESTRATION MAP';
}

function showTab(name) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelector(`.tab[onclick="showTab('${name}')"]`).classList.add('active');
    document.getElementById('sidebar-body').innerHTML = TABS[name];
}

// Initial render
showTab('overview');
setTimeout(drawLinks, 150);
window.addEventListener('resize', drawLinks);

wrap.addEventListener('click', e => {
    if (e.target === wrap || e.target === svgEl) clearHL();
});
</script>
